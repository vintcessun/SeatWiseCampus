server:
  port: 8080

spring:
  application:
    name: seatwise-server
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:seatwise}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:seatwise123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

sa-token:
  token-name: satoken
  timeout: 604800
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-read-cookie: false
  is-read-header: true

# Redis（Redisson 使用）
redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}

# 业务参数（可被环境变量覆盖）
seatwise:
  slot-minutes: ${SEATWISE_SLOT_MINUTES:30}
  signin-window-minutes: ${SEATWISE_SIGNIN_WINDOW_MINUTES:15}
  noshow-threshold: ${SEATWISE_NOSHOW_THRESHOLD:3}
  blacklist-days: ${SEATWISE_BLACKLIST_DAYS:7}
  daily-limit: ${SEATWISE_DAILY_LIMIT:3}
  max-slots-per-reservation: ${SEATWISE_MAX_SLOTS_PER_RESERVATION:8}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.seatwise: info
