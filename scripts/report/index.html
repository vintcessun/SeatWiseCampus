:root{--bg:#f4f6fb;--card:#fff;--line:#e6e9f2;--fg:#1f2430;--sub:#8a93a6;--pri:#3b6cff}

*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--fg)}
header{padding:28px 24px;background:linear-gradient(135deg,#3b6cff,#8f5bff);color:#fff}

nav{position:sticky;top:0;z-index:5;display:flex;gap:8px;flex-wrap:wrap;padding:12px 24px;background:var(--card);border-bottom:1px solid var(--line)}

main{padding:24px;max-width:1400px;margin:0 auto}
section{margin-bottom:40px}
h2{font-size:18px;border-left:4px solid var(--pri);padding-left:10px}h2 small{color:var(--sub);font-weight:400;font-size:13px}
.grid{display:grid;gap:16px}
.grid.wide{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
.grid.tall{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
figure{margin:0;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:transform .15s,box-shadow .15s}
figure:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(31,45,80,.14)}
.grid.tall img{aspect-ratio:auto}
figure img{width:100%;display:block;background:#fff;max-height:520px;object-fit:cover;object-position:top}
figcaption{padding:8px 10px;font-size:12px;color:var(--sub);border-top:1px solid var(--line)}
