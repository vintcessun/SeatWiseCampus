services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    container_name: seatwise-mysql
    environment:
      MYSQL_ROOT_PASSWORD: seatwise123
      MYSQL_DATABASE: seatwise
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pseatwise123"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: seatwise-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./server
    restart: unless-stopped
    container_name: seatwise-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: seatwise
      MYSQL_USER: root
      MYSQL_PASSWORD: seatwise123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Shanghai
      # AI 助手（可选）：配置后启用大模型，缺省走离线规则引擎
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    ports:
      - "18080:8080"

  frontend:
    build: ./client
    restart: unless-stopped
    container_name: seatwise-frontend
    depends_on:
      - backend
    ports:
      - "8888:80"

volumes:
  mysql-data:
